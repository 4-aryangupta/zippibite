<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZippBite — Delivered at the Speed of Craving</title>
    <meta name="description" content="ZippBite: ultrafast food delivery, engineered for speed." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

    <!-- NOTE: /style.css is intentionally NOT linked here.
         It is the landing page's standalone stylesheet (cursor:none on body,
         custom cursor divs, grain/vignette overlays, etc.) which would break

         The LandingPage component injects /main.js which adds those styles
         only when the landing page is active. -->
